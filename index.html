<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gemini Branch Mindmap</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app-shell">
    <aside id="historyPanel" class="history-panel" aria-label="历史对话">
      <div class="history-top">
        <div>
          <p class="eyebrow">Memory</p>
          <h2>历史</h2>
        </div>
        <button id="toggleHistory" class="icon-button history-toggle" title="折叠历史" aria-label="折叠历史">‹</button>
      </div>
      <button id="newHistorySession" class="history-new">+ 新对话</button>
      <div id="historyList" class="history-list"></div>
    </aside>
    <section class="map-panel" aria-label="分支脑图">
      <header class="topbar">
        <div>
          <p class="eyebrow">Gemini Branches</p>
          <h1>把对话长成脑图</h1>
        </div>
        <div class="topbar-actions">
          <button id="zoomOut" class="icon-button" title="缩小" aria-label="缩小">−</button>
          <button id="zoomIn" class="icon-button" title="放大" aria-label="放大">+</button>
          <button id="resetView" class="icon-button" title="重置视图" aria-label="重置视图">⌂</button>
        </div>
      </header>

      <div id="mindmapViewport" class="mindmap-viewport">
        <div id="mindmap" class="mindmap" role="tree">
          <svg id="linkLayer" class="link-layer" aria-hidden="true"></svg>
        </div>
      </div>
    </section>

    <aside class="side-panel" aria-label="对话控制台">
      <section class="control-block session-block">
        <div class="selected-node">
          <span id="selectedType" class="node-chip">ROOT</span>
          <h2 id="selectedTitle">新的对话树</h2>
          <p id="selectedMeta">选择任意 Gemini 回答节点，就能从那里继续追问并生成一个新的分支。</p>
        </div>
      </section>

      <section class="control-block">
        <label for="apiKey">Gemini API Key</label>
        <div class="inline-field">
          <input id="apiKey" type="password" autocomplete="off" placeholder="AIza...">
          <button id="saveKey" class="quiet-button">保存</button>
        </div>
        <div class="inline-field">
          <select id="modelSelect" aria-label="模型">
            <option value="gemini-1.5-flash">gemini-1.5-flash</option>
            <option value="gemini-1.5-pro">gemini-1.5-pro</option>
            <option value="gemini-2.0-flash-exp">gemini-2.0-flash-exp</option>
          </select>
          <button id="toggleMock" class="quiet-button" aria-pressed="false">本地草稿</button>
        </div>
      </section>

      <section class="control-block composer-block">
        <label for="promptInput">针对当前节点追问</label>
        <textarea id="promptInput" rows="7" placeholder="比如：把这个回答展开成三个实现方案，并比较取舍"></textarea>
        <button id="askButton" class="primary-button">发送到 Gemini</button>
        <p id="statusText" class="status-text" aria-live="polite"></p>
      </section>

      <section class="control-block">
        <div class="branch-toolbar">
          <button id="newTree" class="tool-button">新树</button>
          <button id="seedExample" class="tool-button">示例</button>
          <button id="exportTree" class="tool-button">导出</button>
          <label class="tool-button file-tool" for="importTree">导入</label>
          <input id="importTree" type="file" accept="application/json">
        </div>
      </section>

      <section class="control-block path-block">
        <h3>当前路径</h3>
        <ol id="pathList" class="path-list"></ol>
      </section>
    </aside>
  </main>

  <template id="nodeTemplate">
    <article class="node-card" role="treeitem">
      <div class="node-card-top">
        <span class="node-role"></span>
        <span class="node-count"></span>
      </div>
      <p class="node-text"></p>
    </article>
  </template>

  <script src="app.js"></script>
</body>
</html>
